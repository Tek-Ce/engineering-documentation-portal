version: '3.8'

# ============================================================
# PRODUCTION docker-compose — AWS EC2
# Usage: docker compose -f docker-compose.prod.yml up -d
# ============================================================

services:

  # ── MySQL Database ─────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: docportal-mysql
    restart: unless-stopped
    env_file: .env.production
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - docportal-internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── FastAPI Backend ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: docportal-backend
    restart: unless-stopped
    env_file: .env.production
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - docportal-internal
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── React Frontend (Nginx) ──────────────────────────────────
  frontend:
    build:
      context: ./engineering-portal-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
    container_name: docportal-frontend
    restart: unless-stopped
    networks:
      - docportal-internal

  # ── Nginx Reverse Proxy (SSL termination) ──────────────────
  nginx:
    image: nginx:alpine
    container_name: docportal-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
      - uploads_data:/var/www/uploads:ro
    depends_on:
      - backend
      - frontend
    networks:
      - docportal-internal

  # ── Certbot (SSL certificate renewal) ──────────────────────
  certbot:
    image: certbot/certbot
    container_name: docportal-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  mysql_data:
    driver: local
  uploads_data:
    driver: local

networks:
  docportal-internal:
    driver: bridge
