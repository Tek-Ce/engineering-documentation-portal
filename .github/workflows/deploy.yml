name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 20m
          script: |
            cd /opt/docportal

            # Pull latest code from GitHub
            git fetch origin main
            git reset --hard origin/main

            # Rebuild and restart only backend + frontend (mysql stays up)
            docker compose -f docker-compose.prod.yml build backend frontend
            docker compose -f docker-compose.prod.yml up -d --no-deps backend frontend

            # Wait for backend to start
            sleep 15

            # Run any new migrations
            docker compose -f docker-compose.prod.yml exec -T backend alembic upgrade heads

            # Health check
            curl -sf http://localhost:8000/health && echo "Backend healthy" || echo "WARNING: backend not responding"
